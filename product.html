<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Detail</title>
<link rel="stylesheet" href="styles/style.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">M.T.E.D</a>
</header>

<section class="product-detail">
  <button onclick="history.back()" class="back-btn">← Back</button>
  <div class="product-wrapper">
    <div class="slider-container">
      <button class="prev">&lt;</button>
      <div class="slider-images" id="slider-images"></div>
      <button class="next">&gt;</button>
    </div>
    <div class="product-info" id="product-info"></div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="toast.js"></script>
<script src="product.js"></script>
</body>
</html>
